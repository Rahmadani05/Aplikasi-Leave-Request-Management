services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: leavehub
      DB_USERNAME: root
      DB_PASSWORD: password

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: leavehub
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"